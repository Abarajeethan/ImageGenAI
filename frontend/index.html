<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImageGen Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    /* CSS Variables - Light mode default */
    :root {
      --bg-page: #f0f0f6;
      --bg-surface: #ffffff;
      --bg-surface-2: #f7f7fc;
      --bg-surface-3: #ededf3;
      --bg-input: #ffffff;
      --bg-sidebar: #ffffff;
      --bg-modal: #ffffff;
      --bg-placeholder: #ededf3;
      --bg-stat: #f5f5fa;
      --bg-detail-hdr: #ffffff;
      --border: #e2e2ea;
      --border-subtle: rgba(0,0,0,0.06);
      --border-strong: #d4d4dc;
      --text-1: #09090b;
      --text-2: #3f3f46;
      --text-3: #52525b;
      --text-4: #71717a;
      --text-5: #a1a1aa;
      --text-6: #c4c4cc;
      --nav-hover: rgba(99,102,241,0.07);
      --nav-active: rgba(99,102,241,0.1);
      --nav-text: #71717a;
      --nav-active-text: #4f46e5;
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.06);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 14px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 28px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.04);
      --shadow-sidebar: 2px 0 12px rgba(0,0,0,0.06);
      --shadow-card-hover: 0 4px 16px rgba(99,102,241,0.12);
      --scrollbar-thumb: rgba(0,0,0,0.14);
      --modal-overlay: rgba(0,0,0,0.32);
      --row-hover: rgba(99,102,241,0.03);
      --row-border: #f0f0f6;
      --toggle-track: rgba(0,0,0,0.12);
      --toggle-thumb: #71717a;
      --accent: #6366f1;
      --sidebar-blur: blur(0px);
    }

    /* Dark mode */
    [data-theme="dark"] {
      --bg-page: #09090b;
      --bg-surface: rgba(255,255,255,0.03);
      --bg-surface-2: rgba(255,255,255,0.05);
      --bg-surface-3: rgba(255,255,255,0.08);
      --bg-input: rgba(255,255,255,0.05);
      --bg-sidebar: rgba(0,0,0,0.45);
      --bg-modal: #18181b;
      --bg-placeholder: rgba(255,255,255,0.04);
      --bg-stat: rgba(255,255,255,0.04);
      --bg-detail-hdr: rgba(0,0,0,0.3);
      --border: rgba(255,255,255,0.08);
      --border-subtle: rgba(255,255,255,0.05);
      --border-strong: rgba(255,255,255,0.12);
      --text-1: #fafafa;
      --text-2: #e4e4e7;
      --text-3: #a1a1aa;
      --text-4: #71717a;
      --text-5: #52525b;
      --text-6: #3f3f46;
      --nav-hover: rgba(255,255,255,0.05);
      --nav-active: rgba(99,102,241,0.1);
      --nav-text: #52525b;
      --nav-active-text: #818cf8;
      --shadow-xs: none;
      --shadow-sm: none;
      --shadow-md: none;
      --shadow-lg: none;
      --shadow-sidebar: none;
      --shadow-card-hover: 0 0 20px rgba(99,102,241,0.08);
      --scrollbar-thumb: rgba(255,255,255,0.1);
      --modal-overlay: rgba(0,0,0,0.7);
      --row-hover: rgba(255,255,255,0.03);
      --row-border: rgba(255,255,255,0.05);
      --toggle-track: rgba(255,255,255,0.1);
      --toggle-thumb: #71717a;
      --accent: #6366f1;
      --sidebar-blur: blur(20px);
    }
    /* Reset & base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      background: var(--bg-page);
      color: var(--text-3);
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; background: none; border: none; }
    input, select, textarea { font-family: inherit; font-size: 14px; }
    img { display: block; max-width: 100%; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toastIn { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:translateX(0); } }
    @keyframes toastOut { to { opacity:0; transform:translateX(12px); } }
    @keyframes pulse-border {
      0%, 100% { border-color: rgba(245,158,11,0.3); box-shadow: 0 0 0 0 rgba(245,158,11,0); }
      50% { border-color: rgba(245,158,11,0.7); box-shadow: 0 0 16px rgba(245,158,11,0.2); }
    }
    @keyframes shimmer { 0% { opacity:0.4; } 50% { opacity:0.8; } 100% { opacity:0.4; } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    .spin svg, .spin { animation: spin 0.8s linear infinite; }
    .spin-inline { animation: spin 0.8s linear infinite; display:inline-block; }
    .mono { font-family: 'JetBrains Mono', Consolas, monospace; }
    .text-dim { color: var(--text-5); }
    .flex-row { display: flex; align-items: center; flex-wrap: wrap; }
    .gap-2 { gap: 8px; }
    .p-8 { padding: 32px; }

    /* App shell */
    .app-shell { display: flex; height: 100vh; overflow: hidden; }
    .main-content { flex: 1; overflow: auto; background: var(--bg-page); }
    .page-content { padding: 24px; max-width: 1400px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 20px; font-weight: 700; color: var(--text-1); letter-spacing: -0.01em; }
    .page-sub { font-size: 12px; color: var(--text-5); margin-top: 2px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    /* Sidebar */
    .sidebar {
      width: 56px; display: flex; flex-direction: column; flex-shrink: 0;
      background: var(--bg-sidebar);
      backdrop-filter: var(--sidebar-blur);
      -webkit-backdrop-filter: var(--sidebar-blur);
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow-sidebar);
      transition: width 0.2s ease, background 0.2s;
      overflow: hidden; z-index: 10;
    }
    .sidebar.open { width: 224px; }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 14px; height: 56px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .logo-icon { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 0 16px rgba(99,102,241,0.35); }
    .logo-title { font-size: 12px; font-weight: 700; color: var(--text-1); line-height: 1.2; white-space: nowrap; }
    .logo-sub { font-size: 11px; color: var(--text-5); line-height: 1.2; white-space: nowrap; }
    .sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; }
    .nav-link { display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--nav-text); transition: all 0.15s; cursor: pointer; border-left: 2px solid transparent; white-space: nowrap; }
    .nav-link:hover { color: var(--text-2); background: var(--nav-hover); }
    .nav-link.active { color: var(--nav-active-text); background: var(--nav-active); border-left-color: var(--accent); }
    .nav-icon { flex-shrink: 0; display: flex; align-items: center; }
    .nav-label { overflow: hidden; }
    .logout-btn:hover { color: #ef4444 !important; background: rgba(239,68,68,0.08) !important; }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 8px; }
    .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; margin-bottom: 4px; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; background: var(--nav-hover); display: flex; align-items: center; justify-content: center; color: var(--text-4); }
    .user-name { font-size: 12px; font-weight: 600; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: var(--text-5); white-space: nowrap; }
    .sidebar-toggle { width: 100%; display: flex; justify-content: center; align-items: center; padding: 6px; margin-top: 4px; color: var(--text-5); transition: color 0.15s; }
    .sidebar-toggle:hover { color: var(--text-3); }
    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: all 0.15s; cursor: pointer; white-space: nowrap; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn-primary { color: #fff; border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 0 18px rgba(99,102,241,0.28); }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 0 28px rgba(99,102,241,0.45); filter: brightness(1.06); }
    .btn-secondary { color: var(--text-2); background: var(--bg-surface-2); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: var(--bg-surface-3); border-color: var(--border-strong); }
    .btn-secondary.active { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.25); color: var(--nav-active-text); }
    .btn-danger { color: #dc2626; background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2); }
    [data-theme="dark"] .btn-danger { color: #f87171; }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.12); }
    .btn-success { color: #16a34a; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); }
    [data-theme="dark"] .btn-success { color: #4ade80; }
    .btn-success:hover:not(:disabled) { background: rgba(34,197,94,0.14); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
    .btn-icon { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-4); transition: all 0.15s; background: var(--bg-surface-2); border: 1px solid var(--border); }
    .btn-icon:hover { color: var(--text-2); background: var(--bg-surface-3); }
    .btn-block { width: 100%; justify-content: center; padding: 10px; }

    /* Card */
    .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-sm); }

    /* Inputs */
    .input { width: 100%; background: var(--bg-input); border: 1px solid var(--border-strong); border-radius: 8px; padding: 8px 12px; font-size: 13px; color: var(--text-1); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .input::placeholder { color: var(--text-5); }
    .input:focus { border-color: rgba(99,102,241,0.55); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    select.input option { background: var(--bg-modal); color: var(--text-1); }
    textarea.input { resize: vertical; }
    .label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-4); margin-bottom: 6px; }
    .field { display: flex; flex-direction: column; }
    .field-row { display: flex; gap: 12px; flex-wrap: wrap; }
    /* Tags / Badges */
    .tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; border: 1px solid; }
    .tag-blue { background: rgba(99,102,241,0.08); color: #4f46e5; border-color: rgba(99,102,241,0.2); }
    [data-theme="dark"] .tag-blue { color: #818cf8; }
    .tag-green { background: rgba(34,197,94,0.08); color: #16a34a; border-color: rgba(34,197,94,0.2); }
    [data-theme="dark"] .tag-green { color: #4ade80; }
    .tag-amber { background: rgba(245,158,11,0.08); color: #d97706; border-color: rgba(245,158,11,0.2); }
    [data-theme="dark"] .tag-amber { color: #fbbf24; }
    .tag-red { background: rgba(239,68,68,0.08); color: #dc2626; border-color: rgba(239,68,68,0.2); }
    [data-theme="dark"] .tag-red { color: #f87171; }
    .tag-purple { background: rgba(139,92,246,0.08); color: #7c3aed; border-color: rgba(139,92,246,0.2); }
    [data-theme="dark"] .tag-purple { color: #c084fc; }
    .tag-slate { background: var(--bg-surface-2); color: var(--text-4); border-color: var(--border); }
    .tag-dim { background: transparent; color: var(--text-5); border-color: var(--border); font-size: 10px; padding: 1px 5px; }
    .tag-group { display: flex; flex-wrap: wrap; gap: 4px; }
    .product-keywords { display: flex; flex-wrap: wrap; gap: 3px; margin: 4px 0 2px; }

    .status-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; border: 1px solid; }
    .status-PENDING_AI { background: var(--bg-surface-2); color: var(--text-4); border-color: var(--border); }
    .status-AI_GENERATING { background: rgba(245,158,11,0.08); color: #d97706; border-color: rgba(245,158,11,0.2); }
    [data-theme="dark"] .status-AI_GENERATING { color: #fbbf24; }
    .status-AI_READY { background: rgba(99,102,241,0.08); color: #4f46e5; border-color: rgba(99,102,241,0.2); }
    [data-theme="dark"] .status-AI_READY { color: #818cf8; }
    .status-AI_FAILED { background: rgba(239,68,68,0.08); color: #dc2626; border-color: rgba(239,68,68,0.2); }
    [data-theme="dark"] .status-AI_FAILED { color: #f87171; }
    .status-USER_SELECTED { background: rgba(139,92,246,0.08); color: #7c3aed; border-color: rgba(139,92,246,0.2); }
    [data-theme="dark"] .status-USER_SELECTED { color: #c084fc; }
    .status-APPROVED { background: rgba(34,197,94,0.08); color: #16a34a; border-color: rgba(34,197,94,0.2); }
    [data-theme="dark"] .status-APPROVED { color: #4ade80; }
    .status-PIM_SYNCED { background: rgba(20,184,166,0.08); color: #0d9488; border-color: rgba(20,184,166,0.2); }
    [data-theme="dark"] .status-PIM_SYNCED { color: #2dd4bf; }

    .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-4); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .divider { border-top: 1px solid var(--border); }

    /* Loading / error states */
    .loading, .error-state { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 48px; color: var(--text-4); font-size: 14px; }
    .loading svg { animation: spin 0.8s linear infinite; }
    .error-state { color: #dc2626; }
    [data-theme="dark"] .error-state { color: #f87171; }
    /* Login page */
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.1) 0%, var(--bg-page) 60%); }
    .login-box { width: 100%; max-width: 360px; animation: fadeIn 0.3s ease; }
    .login-header { text-align: center; margin-bottom: 28px; }
    .login-logo { width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 0 32px rgba(99,102,241,0.35); color: #fff; }
    .login-title { font-size: 22px; font-weight: 700; color: var(--text-1); letter-spacing: -0.02em; }
    .login-sub { font-size: 13px; color: var(--text-4); margin-top: 4px; }
    .login-form { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .login-hint { text-align: center; font-size: 12px; color: var(--text-5); margin-top: 14px; }
    .pw-wrap { position: relative; }
    .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-4); transition: color 0.15s; background: none; border: none; display: flex; align-items: center; }
    .pw-toggle:hover { color: var(--text-2); }

    /* Filter bar */
    .filter-bar { padding: 16px; margin-bottom: 16px; }
    .filter-grid { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filter-grid .field { flex: 1; min-width: 140px; }

    /* Product grid */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .product-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s; box-shadow: var(--shadow-xs); }
    .product-card:hover { border-color: rgba(99,102,241,0.35); box-shadow: var(--shadow-card-hover); transform: translateY(-1px); }
    .product-thumb { aspect-ratio: 3/4; background: var(--bg-placeholder); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .product-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .thumb-img { opacity: 0; transition: opacity 0.18s; }
    .thumb-img.thumb-active { opacity: 1; }
    .thumb-dots { position: absolute; bottom: 6px; left: 0; right: 0; display: flex; justify-content: center; gap: 4px; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 2; }
    .product-thumb:hover .thumb-dots { opacity: 1; }
    .thumb-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.45); transition: background 0.15s, transform 0.15s; }
    .thumb-dot.active { background: #fff; transform: scale(1.3); }
    .img-placeholder { color: var(--text-5); }
    .product-card.generating { animation: pulse-border 2s ease infinite; border-color: rgba(245,158,11,0.4); }
    .product-card.generating .img-placeholder { color: #d97706; animation: shimmer 2s ease infinite; }
    .generating-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; font-weight: 600; color: #fbbf24; }
    .generating-overlay svg { animation: spin 1.2s linear infinite; }
    .ai-badge { position: absolute; top: 8px; right: 8px; background: rgba(99,102,241,0.9); color: #fff; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 6px; display: flex; align-items: center; gap: 3px; }
    .product-info { padding: 12px; }
    .product-name { font-size: 13px; font-weight: 600; color: var(--text-1); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .product-sku { font-size: 11px; color: var(--text-5); margin-bottom: 6px; }
    .product-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; }
    .img-count { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-4); }

    /* Pagination */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 24px; padding: 12px; }
    /* Data table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-4); border-bottom: 1px solid var(--border); }
    .data-table tr { border-bottom: 1px solid var(--row-border); }
    .data-table tr:last-child { border-bottom: none; }
    .data-table td { color: var(--text-3); vertical-align: middle; }
    .product-row { cursor: pointer; transition: background 0.12s; }
    .product-row:hover { background: var(--row-hover); }

    /* Product detail */
    .detail-layout { display: flex; flex-direction: column; height: 100vh; }
    .detail-header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg-detail-hdr); box-shadow: var(--shadow-xs); flex-shrink: 0; }
    .detail-title-block { flex: 1; min-width: 0; }
    .detail-title { font-size: 16px; font-weight: 700; color: var(--text-1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .detail-sku { font-size: 11px; color: var(--text-5); margin-top: 2px; }
    .detail-body { flex: 1; overflow: hidden; display: grid; grid-template-columns: 360px 1fr; }
    .prompt-cta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .btn-cta { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; transition: all 0.15s; cursor: pointer; white-space: nowrap; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    .btn-cta:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-cta:active:not(:disabled) { transform: scale(0.97); }
    .btn-cta-purple { color: #fff; background: linear-gradient(135deg, #4f46e5, #7c3aed); box-shadow: 0 2px 12px rgba(99,102,241,0.35); }
    .btn-cta-purple:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(99,102,241,0.5); filter: brightness(1.07); }
    .btn-cta-green { color: #fff; background: linear-gradient(135deg, #059669, #0d9488); box-shadow: 0 2px 12px rgba(5,150,105,0.3); }

    .prompt-text { font-size: 13px; line-height: 1.6; color: var(--text-3); white-space: pre-wrap; }

    .prompt-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .history-panel { margin-top: 8px; }

    .history-text { font-size: 12px; color: var(--text-4); line-height: 1.5; }
    .history-meta { font-size: 11px; margin-top: 4px; }

    /* Image gallery */
    .gallery-section { margin-bottom: 24px; }
    .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .img-card { border-radius: 10px; overflow: hidden; background: var(--bg-placeholder); border: 1px solid var(--border); transition: box-shadow 0.15s, border-color 0.15s; display: flex; flex-direction: column; }
    .img-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); }
    .img-thumb { aspect-ratio: 3/4; position: relative; overflow: hidden; cursor: zoom-in; flex-shrink: 0; }
    .img-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
    .img-thumb:hover img { transform: scale(1.03); }
    .img-zoom-hint { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; color: #fff; opacity: 0; transition: opacity 0.2s; }
    .img-thumb:hover .img-zoom-hint { opacity: 1; }
    .img-sort { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6); color: #fafafa; font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 6px; }
    .img-ai-badge { position: absolute; top: 6px; right: 6px; background: rgba(99,102,241,0.9); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 6px; display: flex; align-items: center; gap: 3px; }
    .img-approved-badge { position: absolute; bottom: 6px; right: 6px; background: rgba(34,197,94,0.9); color: #fff; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .img-drag-handle { position: absolute; top: 6px; left: 6px; color: rgba(255,255,255,0.6); opacity: 0; transition: opacity 0.2s; }
    .img-card:hover .img-drag-handle { opacity: 1; }
    .sortable-ghost { opacity: 0.4; }
    /* AI image action bar */
    .img-actions { display: flex; border-top: 1px solid var(--border); }
    .img-action-btn { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px 4px; font-size: 11px; font-weight: 600; gap: 4px; transition: background 0.12s, color 0.12s; cursor: pointer; background: none; border: none; border-right: 1px solid var(--border); color: var(--text-4); }
    .img-action-btn:last-child { border-right: none; }
    .img-action-btn:hover { background: var(--bg-surface-3); }
    .img-action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .img-action-approve { color: #16a34a; }
    [data-theme="dark"] .img-action-approve { color: #4ade80; }
    .img-action-approve:hover:not(:disabled) { background: rgba(34,197,94,0.08) !important; }
    .img-action-approve.is-approved { color: #16a34a; opacity: 0.5; }
    .img-action-retry { color: #4f46e5; }
    [data-theme="dark"] .img-action-retry { color: #818cf8; }
    .img-action-retry:hover { background: rgba(99,102,241,0.08) !important; }
    .img-action-reject { color: #dc2626; }
    [data-theme="dark"] .img-action-reject { color: #f87171; }
    .img-action-reject:hover { background: rgba(239,68,68,0.08) !important; }
    .img-action-recall { color: #d97706; }
    [data-theme="dark"] .img-action-recall { color: #fbbf24; }
    .img-action-recall:hover { background: rgba(234,179,8,0.1) !important; }
    /* Lightbox */
    .lightbox { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); animation: fadeIn 0.15s ease; }
    .lightbox-img-wrap { position: relative; width: 100vw; height: 100vh; max-width: none; max-height: none; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .lightbox-img-wrap img { max-width: 96vw; max-height: 92vh; object-fit: contain; border-radius: 6px; box-shadow: 0 24px 64px rgba(0,0,0,0.6); cursor: zoom-in; user-select: none; transform-origin: center center; will-change: transform; }
    .lightbox-zoom-hint { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.45); font-size: 11px; pointer-events: none; }
    .lightbox-close { position: fixed; top: 16px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.12); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: background 0.15s; z-index: 201; }
    .lightbox-close:hover { background: rgba(255,255,255,0.22); }
    .lightbox-nav { position: fixed; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.12); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: background 0.15s; z-index: 201; font-size: 22px; }
    .lightbox-nav:hover { background: rgba(255,255,255,0.22); }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }
    .lightbox-nav:disabled { opacity: 0.2; cursor: default; }
    .lightbox-caption { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 12px; text-align: center; white-space: nowrap; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: var(--modal-overlay); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; backdrop-filter: blur(4px); }
    .modal-box { width: 100%; max-width: 420px; padding: 24px; background: var(--bg-modal); box-shadow: var(--shadow-lg); }
    .modal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .modal-header h3 { font-size: 16px; font-weight: 700; color: var(--text-1); }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    /* Analytics */
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; box-shadow: var(--shadow-xs); }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--text-1); letter-spacing: -0.02em; }
    .stat-label { font-size: 12px; color: var(--text-4); margin-top: 4px; font-weight: 500; }
    .stat-card.stat-blue { border-color: rgba(99,102,241,0.2); }
    .stat-card.stat-blue .stat-value { color: #4f46e5; }
    [data-theme="dark"] .stat-card.stat-blue .stat-value { color: #818cf8; }
    .stat-card.stat-green { border-color: rgba(34,197,94,0.2); }
    .stat-card.stat-green .stat-value { color: #16a34a; }
    [data-theme="dark"] .stat-card.stat-green .stat-value { color: #4ade80; }
    .stat-card.stat-red { border-color: rgba(239,68,68,0.2); }
    .stat-card.stat-red .stat-value { color: #dc2626; }
    [data-theme="dark"] .stat-card.stat-red .stat-value { color: #f87171; }
    .approval-rate-row { display: flex; align-items: center; gap: 16px; }
    .approval-rate-pct { font-size: 32px; font-weight: 800; color: #16a34a; flex-shrink: 0; letter-spacing: -0.02em; }
    [data-theme="dark"] .approval-rate-pct { color: #4ade80; }
    .approval-rate-bar-wrap { flex: 1; height: 8px; background: var(--bg-surface-3); border-radius: 4px; overflow: hidden; }
    .approval-rate-bar { height: 100%; background: linear-gradient(135deg, #22c55e, #4ade80); border-radius: 4px; transition: width 0.5s ease; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .chart-card { padding: 20px; }
    @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
    .days-selector { display: flex; gap: 4px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
    .tab-btn { padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--text-4); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab-btn:hover { color: var(--text-2); }
    .tab-btn.active { color: var(--nav-active-text); border-bottom-color: var(--accent); }

    /* Gallery tabs */
    .gallery-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
    .gallery-tab { padding: 9px 18px; font-size: 13px; font-weight: 600; color: var(--text-4); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .gallery-tab:hover { color: var(--text-2); }
    .gallery-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* AI Prompt cards (3-option selector) */
    .ai-prompts-panel { margin-top: 14px; padding: 14px; background: rgba(99,102,241,0.05); border: 1px solid rgba(99,102,241,0.18); border-radius: 10px; }
    .ai-prompts-header { font-size: 11px; font-weight: 700; color: #818cf8; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .ai-prompts-desc { font-size: 12px; color: var(--text-3); margin: 0 0 12px; line-height: 1.5; }
    .ai-prompt-cards { display: flex; flex-direction: column; gap: 10px; }
    .ai-prompt-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; transition: border-color 0.15s, box-shadow 0.15s; }
    .ai-prompt-card:hover { border-color: rgba(99,102,241,0.4); box-shadow: 0 2px 8px rgba(99,102,241,0.1); }
    .ai-prompt-card-header { margin-bottom: 6px; }
    .ai-prompt-setting { font-size: 12px; font-weight: 700; color: var(--text-1); }
    .ai-prompt-card-tags { margin-bottom: 8px; }
    .ai-prompt-card-text { font-size: 12px; color: var(--text-3); line-height: 1.5; margin: 0 0 10px; }
    .btn-use-prompt { width: 100%; justify-content: center; }

    /* Manual Generate panel */
    .manual-gen-panel { display: flex; flex-direction: column; gap: 20px; }
    .manual-gen-inputs { display: grid; grid-template-columns: 200px 1fr; gap: 16px; }
    @media (max-width: 640px) { .manual-gen-inputs { grid-template-columns: 1fr; } }
    .manual-upload-area { border: 2px dashed var(--border); border-radius: 10px; min-height: 180px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.15s, background 0.15s; }
    .manual-upload-area:hover, .manual-upload-area.drag-over { border-color: var(--accent); background: rgba(99,102,241,0.04); }
    .manual-upload-area.has-image { border-style: solid; padding: 0; }
    .manual-upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-4); padding: 16px; text-align: center; pointer-events: none; }
    .manual-upload-label { font-size: 12px; font-weight: 600; color: var(--text-3); }
    .manual-preview-img { width: 100%; height: 100%; object-fit: contain; max-height: 220px; }

    .manual-prompt-textarea { resize: vertical; font-size: 13px; }
    .manual-result { border-top: 1px solid var(--border); padding-top: 16px; }
    .manual-result-img-wrap { position: relative; display: inline-block; max-width: 100%; }

    .manual-result-img-wrap .img-zoom-hint { border-radius: 8px; }
    .manual-result-actions { display: flex; gap: 8px; }

    /* Toggle switch */
    .toggle-label { display: inline-flex; align-items: center; cursor: pointer; }
    .toggle-check { display: none; }
    .toggle-slider { width: 36px; height: 20px; background: var(--toggle-track); border-radius: 10px; position: relative; transition: background 0.2s; border: 1px solid var(--border); }
    .toggle-slider::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: var(--toggle-thumb); border-radius: 50%; transition: all 0.2s; }
    .toggle-check:checked ~ .toggle-slider { background: rgba(99,102,241,0.25); border-color: rgba(99,102,241,0.4); }
    .toggle-check:checked ~ .toggle-slider::after { left: 18px; background: var(--accent); }

        /* page subtitle */
    .page-subtitle { font-size: 13px; color: var(--text-4); margin-top: 3px; }

    /* ================================================================
       AI Photoshoot Studio  (manual-generate.js)
    ================================================================ */
    .ps-page {
      padding: 28px 28px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Hero */
    .ps-hero {
      position: relative;

      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: rgba(239,68,68,0.1); color: #ef4444;
      border: 1px solid rgba(239,68,68,0.2); text-transform: none; letter-spacing: 0;
    }
    .ps-optional {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: var(--bg-surface-3); color: var(--text-5);
      text-transform: none; letter-spacing: 0;
    }

    /* Drop zone */
    .ps-dropzone {
      border: 2px dashed var(--border); border-radius: 14px;
      background: var(--bg-surface-2); cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      min-height: 190px; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .ps-dropzone:hover, .ps-dropzone.dz-over {
      border-color: var(--accent); background: rgba(99,102,241,0.04);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.07);
    }
    .ps-dropzone-required { border-color: rgba(99,102,241,0.3); }
    .ps-dropzone-body {
      display: flex; flex-direction: column; align-items: center;
      gap: 7px; padding: 28px 20px; text-align: center; pointer-events: none;
    }
    .ps-dropzone-icon-wrap {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--bg-surface-3); color: var(--text-5);
      display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
    }
    .ps-dropzone-title { font-size: 14px; font-weight: 500; color: var(--text-2); }
    .ps-dropzone-hint  { font-size: 12px; color: var(--text-4); }
    .ps-link { color: var(--accent); font-weight: 500; }
    .ps-dropzone-formats {
      font-size: 11px; color: var(--text-5); margin-top: 4px;
      padding: 3px 12px; background: var(--bg-surface-3); border-radius: 20px;
    }

    /* Thumbnail */
    .ps-thumb-zone { display: flex; align-items: flex-start; gap: 16px; }
    .ps-thumb {
      width: 200px; height: 200px; flex-shrink: 0; border-radius: 12px;
      overflow: hidden; border: 1px solid var(--border);
      position: relative; cursor: pointer; background: var(--bg-page);
    }
    .ps-thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ps-thumb-hover {
      position: absolute; inset: 0; background: rgba(0,0,0,0);
      display: flex; align-items: center; justify-content: center;
      color: #fff; transition: background 0.2s;
    }
    .ps-thumb:hover .ps-thumb-hover { background: rgba(0,0,0,0.42); }
    .ps-thumb-hover span { opacity: 0; transition: opacity 0.2s; }
    .ps-thumb:hover .ps-thumb-hover span { opacity: 1; }
    .ps-thumb-meta { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
    .ps-thumb-name {
      font-size: 12px; color: var(--text-3); font-weight: 500;
      max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ps-thumb-size { font-size: 11px; color: var(--text-5); }
    .ps-thumb-remove {
      background: none; border: 1px solid var(--border); border-radius: 7px;
      color: var(--text-4); font-size: 12px; cursor: pointer; padding: 5px 10px;
      display: flex; align-items: center; gap: 5px; transition: all 0.15s;
    }
    .ps-thumb-remove:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.06); }
    .ps-reupload {
      font-size: 12px; color: var(--accent); cursor: pointer;
      display: flex; align-items: center; gap: 5px; padding: 4px 0;
    }
    .ps-reupload:hover { text-decoration: underline; }

    /* Prompt */
    .ps-textarea {
      width: 100%; box-sizing: border-box; resize: vertical;
      font-size: 13px; line-height: 1.65; min-height: 180px;
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg-input); color: var(--text-1);
      padding: 12px 14px; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .ps-textarea:focus { border-color: var(--accent); }
    .ps-generate-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 12px; padding: 13px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff; font-size: 14px; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(99,102,241,0.35);
    }
    .ps-generate-btn:hover:not(:disabled) {
      opacity: 0.92; box-shadow: 0 6px 20px rgba(99,102,241,0.45);
    }
    .ps-generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .ps-btn-spinner { display: inline-flex; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ps-gen-hint { margin-top: 10px; font-size: 12px; color: var(--text-5); text-align: center; }

    /* Result */
    .ps-result {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden; margin-bottom: 20px;
      animation: ps-slide-in 0.3s ease;
    }
    .ps-result-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      background: var(--bg-surface-2);
    }
    .ps-result-title {
      font-size: 14px; font-weight: 600; color: var(--text-1);
      display: flex; align-items: center; gap: 6px;
    }
    .ps-result-actions { display: flex; gap: 8px; }

    /* Before / After */
    .ps-ba {
      display: grid; grid-template-columns: 1fr auto 1fr;
      min-height: 360px;
    }
    .ps-ba-half { display: flex; flex-direction: column; }
    .ps-ba-label {
      padding: 12px 20px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text-4); background: var(--bg-surface-2);
    }
    .ps-ba-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .ps-dot-before { background: var(--text-5); }
    .ps-dot-after  { background: #7c3aed; }
    .ps-ba-img-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; cursor: pointer; overflow: hidden;
      background: var(--bg-surface);
    }
    .ps-ba-img-wrap:hover .ps-ba-expand { opacity: 1; }
    .ps-ba-img {
      max-width: 100%; max-height: 440px; object-fit: contain;
      border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }
    .ps-ba-img-wrap:hover .ps-ba-img { transform: scale(1.015); }
    .ps-ba-expand {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.5); color: #fff; border-radius: 7px;
      padding: 5px 7px; opacity: 0; transition: opacity 0.2s;
      pointer-events: none; display: flex; align-items: center;
    }
    .ps-ba-arrow {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; width: 40px;
      background: var(--bg-surface-2);
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    }
    .ps-ba-line { flex: 1; width: 1px; background: var(--border); }
    .ps-ba-chevron {
      padding: 8px 0; color: #7c3aed; display: flex; align-items: center;
    }
    .ps-single-result { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 28px; }
    .ps-single-wrap {
      position: relative; cursor: pointer; border-radius: 12px;
      overflow: hidden; border: 1px solid var(--border); max-width: 480px;
    }
    .ps-single-wrap:hover .ps-ba-expand { opacity: 1; }
    .ps-single-img { max-width: 480px; max-height: 480px; object-fit: contain; display: block; }
    .ps-single-hint { font-size: 12px; color: var(--text-5); }

    /* Lightbox */
    .ps-lightbox {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    .ps-lb-bg {
      position: absolute; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
    }
    .ps-lb-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%; color: #fff; cursor: pointer; z-index: 10;
      width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .ps-lb-close:hover { background: rgba(255,255,255,0.2); }
    .ps-lb-wrap {
      position: relative; z-index: 5; max-width: 92vw; max-height: 88vh;
      display: flex; align-items: center; justify-content: center;
    }
    .ps-lb-wrap img {
      max-width: 92vw; max-height: 88vh; object-fit: contain;
      border-radius: 10px; box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    .ps-lb-cap {
      position: relative; z-index: 5; color: rgba(255,255,255,0.5);
      font-size: 13px; letter-spacing: 0.03em;
    }

    /* ── Activity Log ──────────────────────────────────────── */
    .activity-table td { padding: 9px 12px; font-size: 13px; }
    .activity-time { font-size: 12px !important; white-space: nowrap; }
    .activity-detail { font-size: 12px !important; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-3); }
    .sku-link { color: var(--accent); cursor: pointer; text-decoration: none; font-size: 12px; }
    .sku-link:hover { text-decoration: underline; }

    .activity-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; border: 1px solid; white-space: nowrap; }
    .activity-badge-purple { background: rgba(139,92,246,0.08); color: #7c3aed; border-color: rgba(139,92,246,0.2); }
    .activity-badge-green  { background: rgba(34,197,94,0.08);  color: #16a34a; border-color: rgba(34,197,94,0.2);  }
    .activity-badge-orange { background: rgba(249,115,22,0.08); color: #ea580c; border-color: rgba(249,115,22,0.2); }
    .activity-badge-red    { background: rgba(239,68,68,0.08);  color: #dc2626; border-color: rgba(239,68,68,0.2);  }
    .activity-badge-blue   { background: rgba(59,130,246,0.08); color: #2563eb; border-color: rgba(59,130,246,0.2); }
    .activity-badge-teal   { background: rgba(20,184,166,0.08); color: #0d9488; border-color: rgba(20,184,166,0.2); }
    .activity-badge-slate  { background: rgba(100,116,139,0.08); color: #475569; border-color: rgba(100,116,139,0.2); }
    [data-theme="dark"] .activity-badge-purple { color: #a78bfa; }
    [data-theme="dark"] .activity-badge-green  { color: #4ade80; }
    [data-theme="dark"] .activity-badge-orange { color: #fb923c; }
    [data-theme="dark"] .activity-badge-red    { color: #f87171; }
    [data-theme="dark"] .activity-badge-blue   { color: #60a5fa; }
    [data-theme="dark"] .activity-badge-teal   { color: #2dd4bf; }
    [data-theme="dark"] .activity-badge-slate  { color: #94a3b8; }

    /* AI Content Enrichment */
    .enrich-results { display: flex; flex-direction: column; gap: 10px; }
    .enrich-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface-2); border-radius: 7px; }
    .enrich-label { font-size: 11px; font-weight: 600; color: var(--text-dim); min-width: 110px; text-transform: uppercase; letter-spacing: .03em; }
    .enrich-value { flex: 1; font-size: 12px; color: var(--text); line-height: 1.5; }
    [data-theme="dark"] .enrich-row { background: rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/js/router.js"></script>
</body>
</html>
